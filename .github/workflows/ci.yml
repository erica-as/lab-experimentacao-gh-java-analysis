# Build do coletor em todo push/PR (baseline de qualidade).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: dotnet build
        run: dotnet build -c Release lab-experimentacao-gh-java-analysis.sln
