# Release não liga nativamente a “milestone fechada” no GitHub (não há evento on: milestone).
# Fluxo típico: ao encerrar a milestone no UI, Actions → este workflow → preencher tag + notas.
# Opcional: disparo automático ao enviar tag anotada v* (último job).
name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag semver (ex. v0.2.0 ou v0.2.0-lab02-s2)"
        required: true
        type: string
      title:
        description: "Título da release no GitHub"
        required: true
        type: string
      notes:
        description: "Notas (ex. milestone ou changelog curto)"
        required: false
        type: string
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build release
        run: dotnet build -c Release lab-experimentacao-gh-java-analysis.sln

      - name: Release (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          TITLE="${{ inputs.title }}"
          NOTES="${{ inputs.notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Release criada a partir do workflow após conclusão de milestone/entrega."
          fi
          gh release create "$TAG" --title "$TITLE" --notes "$NOTES" --target "${{ github.sha }}"

      - name: Release (tag push v*)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" --generate-notes --title "$TAG"
